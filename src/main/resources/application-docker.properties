spring.application.name=jobposting

# In Docker/EC2, usually MongoDB is another container or managed service.
# Here we assume a MongoDB host passed via env var, with a sensible default.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://mongo:27017/jobposting}

server.port=8080

logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO

